  <body>
    <div id="root"></div>
    <script>
(function(){
  function text(el){return (el && el.textContent || '').replace(/\s+/g,' ').trim();}
  function hasKpi(){return Array.from(document.querySelectorAll('a,button,span,div')).some(function(el){return text(el)==='KPI Personil';});}
  function setText(el,label){
    var spans=el.querySelectorAll('span');
    if(spans.length){spans[spans.length-1].textContent=label;return;}
    el.textContent=label;
  }
  function addKpiMenu(){
    if(hasKpi()) return;
    var anchors=Array.from(document.querySelectorAll('a'));
    var ref=anchors.find(function(a){return text(a)==='Kinerja Personel';}) || anchors.find(function(a){return text(a)==='Sarpras';}) || anchors.find(function(a){return a.className && String(a.className).indexOf('nav-item')>=0;});
    if(!ref || !ref.parentNode) return;
    var item=ref.cloneNode(true);
    item.setAttribute('href','/kpi-personil.html');
    item.classList.remove('active');
    item.removeAttribute('aria-current');
    item.removeAttribute('data-active');
    item.setAttribute('data-kpi-personil-menu','true');
    setText(item,'KPI Personil');
    item.addEventListener('click',function(e){e.preventDefault(); window.location.href='/kpi-personil.html';},true);
    ref.parentNode.insertBefore(item,ref.nextSibling);
  }
  function addFloating(){
    if(document.getElementById('kpi-personil-float')) return;
    var a=document.createElement('a');
    a.id='kpi-personil-float';
    a.href='/kpi-personil.html';
    a.textContent='🎯 KPI Personil';
    a.style.cssText='position:fixed;right:18px;bottom:18px;z-index:2147483000;background:linear-gradient(135deg,#991b1b,#dc2626);color:#fff;text-decoration:none;border-radius:999px;padding:12px 16px;font:800 13px Inter,system-ui,sans-serif;box-shadow:0 12px 35px rgba(153,27,27,.35);border:1px solid rgba(255,255,255,.25)';
    document.body.appendChild(a);
  }
  function run(){addKpiMenu();addFloating();}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',run); else run();
  new MutationObserver(function(){setTimeout(run,0);}).observe(document.documentElement,{childList:true,subtree:true});
  setInterval(run,1000);
})();
</script>
