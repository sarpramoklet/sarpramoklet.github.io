    <div id="root"></div>
    <script>
(function(){
  function cleanText(el){return (el && el.textContent || '').replace(/\s+/g,' ').trim();}
  function exact(label){return Array.from(document.querySelectorAll('a,button')).find(function(el){return cleanText(el)===label;});}
  function exists(){return Array.from(document.querySelectorAll('a,button')).some(function(el){return cleanText(el)==='KPI Personil';});}
  function setMenuLabel(el,label){
    var spans=el.querySelectorAll('span');
    if(spans.length) spans[spans.length-1].textContent=label;
    else el.textContent=label;
  }
  function addKpiMenu(){
    var oldFloat=document.getElementById('kpi-personil-float');
    if(oldFloat) oldFloat.remove();
    if(exists()) return;
    var ref=exact('Monitor CAPEX') || exact('Kinerja Personel') || exact('Performance') || exact('Sarpras');
    if(!ref || !ref.parentNode) return;
    var item=ref.cloneNode(true);
    item.setAttribute('href','/kpi-personil.html');
    item.classList.remove('active');
    item.removeAttribute('aria-current');
    item.removeAttribute('data-active');
    item.setAttribute('data-kpi-personil-menu','true');
    setMenuLabel(item,'KPI Personil');
    item.addEventListener('click',function(e){e.preventDefault(); window.location.href='/kpi-personil.html';},true);
    ref.parentNode.insertBefore(item,ref.nextSibling);
  }
  function run(){addKpiMenu();}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',run); else run();
  new MutationObserver(function(){setTimeout(run,0);setTimeout(run,300);}).observe(document.documentElement,{childList:true,subtree:true});
  setInterval(run,1500);
})();
</script>
